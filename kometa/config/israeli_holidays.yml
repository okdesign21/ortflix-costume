# Israeli / Jewish seasonal movie collections (Films library).
#
# Schedule windows are maintained by scripts/update_jewish_dates.py, which
# fetches each holiday's Gregorian anchor date via the HebCal API and rewrites
# the start_date / end_date fields below.  Run it once before Rosh Hashana to
# keep the windows correct for the coming year.
#
#   python ortflix-costume/scripts/update_jewish_dates.py
#   python ortflix-costume/scripts/update_jewish_dates.py --dry-run
#   python ortflix-costume/scripts/update_jewish_dates.py --year 2027

templates:
  IsraeliHoliday:
    smart_label: title.asc
    sort_title: "!00_<<collection_name>>"
    schedule: range(<<start_date>>-<<end_date>>)
    delete_not_scheduled: true
    sync_mode: sync
    cache_builders: 1
    visible_home: true
    visible_shared: true

collections:

  # ── Purim (14 Adar) ──────────────────────────────────────────────────────
  Purim Movies:
    template:
      name: IsraeliHoliday
      start_date: 03/13
      end_date: 03/26
    summary: >-
      The Feast of Esther — films about Queen Esther, Mordecai, and the
      triumph over Haman. Costumes, carnivals, and the oldest Jewish
      survival story.
    imdb_search:
      keyword.any: purim, esther, queen esther, book of esther, mordecai,
                   feast of purim, jewish holiday, hamantaschen
      type: movie
      limit: 200
    plex_search:
      any:
        title:
          - "One Night with the King"
          - "Esther and the King"
          - "The Book of Esther"
          - "Esther"
    item_assets: true

  # ── Passover / Pesach (15 Nisan) ─────────────────────────────────────────
  Passover Movies:
    template:
      name: IsraeliHoliday
      start_date: 03/26
      end_date: 04/10
    summary: >-
      From slavery to freedom — the Exodus story, Moses, and the Ten
      Plagues. Biblical epics that retell the greatest liberation narrative
      in history.
    imdb_search:
      keyword.any: passover, pesach, moses, pharaoh, ten commandments,
                   plagues of egypt, israelites, seder, burning bush,
                   parting of the red sea
      type: movie
      limit: 200
    plex_search:
      any:
        title:
          - "The Ten Commandments"
          - "The Prince of Egypt"
          - "Exodus: Gods and Kings"
          - "Moses the Lawgiver"
          - "Joseph and the Amazing Technicolor Dreamcoat"
          - "The Bible: In the Beginning"
          - "A Rugrats Passover"
          - "The Abominable Dr. Phibes"
          - "Passover Fever"
          - "Passover at the Wellmans"
          - "Moses"
    item_assets: true

  # ── Yom Ha'atzmaut (5 Iyar) ──────────────────────────────────────────────
  Yom Ha'atzmaut Movies:
    template:
      name: IsraeliHoliday
      start_date: 04/17
      end_date: 04/25
    summary: >-
      Israeli Independence Day — quality Israeli cinema alongside
      English-language films about the founding of the State of Israel,
      the Mossad, and defining moments in Israeli history.
    imdb_search:
      keyword.any: israel independence, founding of israel, zionism, mossad,
                   israeli, haganah, six day war, yom kippur war,
                   arab-israeli conflict, entebbe, operation thunderbolt
      type: movie
      limit: 200
    plex_search:
      any:
        title:
          - "Exodus"
          - "Munich"
          - "Operation Finale"
          - "Entebbe"
          - "7 Days in Entebbe"
          - "Cast a Giant Shadow"
          - "Waltz with Bashir"
          - "Beaufort"
          - "Lebanon"
          - "Footnote"
          - "Omar"
          - "Incitement"
          - "Ajami"
          - "Big Bad Wolves"
          - "The Attack"
    item_assets: true

  # ── Hanukkah (25 Kislev) ─────────────────────────────────────────────────
  Hanukkah Movies:
    template:
      name: IsraeliHoliday
      start_date: 12/01
      end_date: 12/15
    summary: >-
      The Festival of Lights — Hanukkah films celebrating the Maccabean
      miracle, the menorah, and the spirit of the eight-night season.
    imdb_search:
      keyword.any: hanukkah, chanukah, menorah, dreidel, maccabee,
                   maccabean revolt, festival of lights, hanukkah miracle,
                   latke, jewish holiday
      type: movie
      limit: 200
    plex_search:
      any:
        title:
          - "Eight Crazy Nights"
          - "Full Court Miracle"
          - "The Hebrew Hammer"
          - "An American Tail"
          - "Rugrats Chanukah"
          - "Love, Lights, Hanukkah"
    item_assets: true
