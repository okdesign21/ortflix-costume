# Plex and TMDb are required
plex:
  url: <<PLEXURL>>
  token: <<PLEXTOKEN>>
  timeout: 60
  db_cache: 256
  clean_bundles: false
  empty_trash: false
  optimize: false
  verify_ssl: false
tmdb:
  apikey: <<TMDBAPIKEY>>
  cache_expiration: 60
  language: en
tautulli:
  url: <<TAUTULLIURL>>
  apikey: <<TAUTULLIAPIKEY>>
mdblist:
  apikey: <<MDBLISTAPIKEY>>
  cache_expiration: 60

libraries:
  Films:
    type: movie
    agent: plex
    overlay_files:
      - default: resolution
        template_variables:
          back_color: "#0D47A1CC"
          back_line_color: "#FFD740"
          back_line_width: 4
          use_4K: false
      - default: audio_codec
      - default: languages
        template_variables:
          languages:
            - he
            - en
            - ja
            - fr
            - es
            - de
            - pt
            - it
            - nl
            - ru
            - ar
            - hu
            - pl
          weight_he: 600
          weight_en: 590
          weight_ja: 580
          weight_fr: 570
          weight_es: 560
          weight_de: 550
          weight_pt: 540
          weight_it: 530
          weight_nl: 520
          weight_ru: 510
          weight_ar: 500
          weight_hu: 490
          weight_pl: 480
          languages_horizontal_align: left
          languages_vertical_align: bottom
          languages_horizontal_offset: 15
          languages_vertical_offset: 15
      - default: mediastinger
        template_variables:
          append_filters:
            label.not: Local
    collection_files:
      - file: config/stats.yml
      - default: tautulli
        template_variables:
          list_size: 10
          list_days: 30
          list_minimum: 0
          collection_section: "00"
      - default: separator_chart
      - default: letterboxd
        template_variables:
          use_1001_movies: false
          use_edgarwright: false
          use_rogerebert: false
          use_imdb_top_250: true
          cache_builders: 7
      - default: imdb
        template_variables:
          use_popular: false
          use_lowest: false
          use_top: false
      - default: separator_award
      - default: oscars
        template_variables:
          use_year_collections: false
      - default: golden
        template_variables:
          use_year_collections: false
      - default: razzie
        template_variables:
          use_year_collections: false
      - default: audio_language
        template_variables:
          use_other: false
          use_separator: true
          sort_by: title.asc
      # Studio merges: fold duplicate *labels* into one collection.
      # Do not merge animation houses.
      - default: studio
        template_variables:
          append_addons:
            ABC Studios:
              - ABC Signature
            CBS Studios:
              - CBS Productions
              - CBS Television Studios
            DreamWorks Studios:
              - DreamWorks Pictures
            Marvel Studios:
              - Marvel Animation
            Paramount Pictures:
              - Paramount Animation
              - Paramount Television Studios
            Touchstone Pictures:
              - Touchstone Television
            Universal Pictures:
              - Universal Television
            Walt Disney Animation Studios:
              - Disney Television Animation
              - DisneyToon Studios
            Walt Disney Pictures:
              - Walt Disney Productions
            Warner Bros. Pictures:
              - Warner Premiere
            "20th Century Studios":
              - 20th Century Fox Television
              - Fox Television Studios
            Pixar:
              - Disney Pixar
              - "Disney·Pixar"
          remove_include:
            - 20th Century Animation
            - 20th Century Fox Television
            - ABC Signature
            - CBS Productions
            - CBS Television Studios
            - Disney Television Animation
            - DisneyToon Studios
            - DreamWorks Pictures
            - Fox Television Studios
            - Marvel Animation
            - Paramount Animation
            - Paramount Television Studios
            - Touchstone Television
            - Universal Animation Studios
            - Universal Television
            - Walt Disney Productions
            - Warner Animation Group
            - Warner Premiere
      - default: franchise
        template_variables:
          name_mapping_Star Trek: "Star Trek Complete"
          remove_data: [9485, 748, 10]
      - default: universe
        template_variables:
          name_mapping_fast: "Fast & Furious Universe"
      - default: based
      - default: seasonal
      - default: resolution
        template_variables:
          use_other: false
      - default: country
        template_variables:
          include:
            - Israel
          use_other: false
          collection_section: "061"
      - file: config/israeli_holidays.yml
      # Curated bundles not built by default.
      - file: config/collections.yml
      - file: config/People.yml
      - file: config/IMDBGenres.yml
        schedule: weekly(sunday)

    operations:
      assets_for_all: true
      assets_for_all_collections: true

  TV Programmes:
    type: show
    agent: plex
    overlay_files:
      - default: resolution
        template_variables:
          back_color: "#0D47A1CC"
          back_line_color: "#FFD740"
          back_line_width: 4
          use_4K: false
      - default: audio_codec
      - default: languages
        template_variables:
          languages:
            - he
            - en
            - ja
            - fr
            - es
            - de
            - pt
            - it
            - nl
            - ru
            - ar
            - hu
            - pl
          weight_he: 600
          weight_en: 590
          weight_ja: 580
          weight_fr: 570
          weight_es: 560
          weight_de: 550
          weight_pt: 540
          weight_it: 530
          weight_nl: 520
          weight_ru: 510
          weight_ar: 500
          weight_hu: 490
          weight_pl: 480
          languages_horizontal_align: left
          languages_vertical_align: bottom
          languages_horizontal_offset: 15
          languages_vertical_offset: 15
      - default: mediastinger
        template_variables:
          append_filters:
            label.not: Local
      # - file: config/tv_status_ribbons.yml
    collection_files:
      - default: tautulli
        template_variables:
          list_size: 10
          list_days: 30
          list_minimum: 0
          collection_section: "00"
      - file: config/shows.yml
      - default: audio_language3
        template_variables:
          use_other: false
          use_separator: true
          sort_by: title.asc
      - default: imdb
        template_variables:
          use_popular: false
          use_lowest: false
          use_top: false
      - default: network
        template_variables:
          append_addons:
            HBO:
              - HBO Max
              - HBO Go
              - Max
          remove_include:
            - HBO Max
      - default: franchise
        template_variables:
          append_addons: 
            253: [223530]
          remove_data: [951, 1399, 4629, 6357, 10222, 31917, 54650, 73586, 79744, 80748, 46296, 108978, 60585, 3476, 61511, 41956]
          name_mapping_Star Trek: "Star Trek TV"
      - default: based

    operations:
      assets_for_all: true
      assets_for_all_collections: true

  Musicals:
    type: movie
    agent: plex
    collection_files:
      - file: config/musicals.yml

settings:
  # Or's settings
  run_order:
    - operations
    - metadata
    - collections
    - overlays
  cache: true
  cache_expiration: 60
  asset_directory:
    - config/assets
  collection_mode: default
  sync_mode: sync
  minimum_items: 2
  default_collection_order: release
  show_missing: false
  tvdb_language: eng
  verify_ssl: false

  # assests
  asset_folders: true
  asset_depth: 2
  create_asset_folders: false
  prioritize_assets: true
  dimensional_asset_rename: false
  download_url_assets: false
  show_missing_assets: true
  show_missing_season_assets: false
  show_missing_episode_assets: false
  show_asset_not_needed: true

  # was here
  delete_below_minimum: true
  delete_not_scheduled: false
  run_again_delay: 2
  missing_only_released: false
  only_filter_missing: false
  show_unmanaged: true
  show_unconfigured: true
  show_filtered: false
  show_unfiltered: false
  show_options: true
  save_report: true
  ignore_ids: 1567451, 712168, 1016041, 753972, 1663155, 1641521
  item_refresh_delay: 0
  playlist_sync_to_users:
  playlist_exclude_users:
  playlist_report: false
  custom_repo:
  overlay_artwork_filetype: webp_lossy
  overlay_artwork_quality: 90

# Can be individually specified per library as well
webhooks:
  changes:
  delete:
  error:
  run_end:
  run_start:
  version:
