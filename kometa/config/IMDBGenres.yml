######################################################
#                Genre Collections                   #
######################################################
# IMDb Genre template – all three variables are overrideable per collection:
#   release_gte  default 1990-01-01  (push back for classic-era genres)
#   votes_gte    default 100000      (lower for older films with fewer ratings)
#   item_type    default movie        (set to documentary for Documentary)
templates:
  IMDb Genre:
    default:
      limit: 100
      release_gte: "1990-01-01"
      votes_gte: 100000
      item_type: movie
    imdb_search:
      type: <<item_type>>
      release.gte: <<release_gte>>
      rating.gte: 5.0
      votes.gte: <<votes_gte>>
      genre: <<genre>>
      limit: <<limit>>
    sort_title: "!092_<<collection_name>>"
    sync_mode: sync
    smart_label: random
  Other Genre:
    sort_title: "!092_<<collection_name>>"
    sync_mode: sync
    smart_label: random

collections:
  Genre Collections:
    blank_collection: true
    collection_mode: hide
    sort_title: "!092_!Genre Collections"
    url_poster: https://raw.githubusercontent.com/Kometa-Team/Kometa/nightly/defaults/separators/orig/separator.png

  # ── Standard IMDb genre searches ──────────────────────────────────────────
  Action:
    template: {name: IMDb Genre, genre: action}
    summary: Action film is a genre wherein physical action takes precedence in the storytelling. The film will often have continuous motion and action including physical stunts, chases, fights, battles, and races. The story usually revolves around a hero that has a goal, but is facing incredible odds to obtain it.

  Adventure:
    template: {name: IMDb Genre, genre: adventure}
    summary: Adventure film is a genre that revolves around the conquests and explorations of a protagonist. The purpose of the conquest can be to retrieve a person or treasure, but often the main focus is simply the pursuit of the unknown. These films generally take place in exotic locations and play on historical myths.

  # Animation: extends back to 1937 (first Disney feature) with a lower vote threshold
  # so classics like Snow White, Fantasia, and Bambi are included.
  Animation:
    template: {name: IMDb Genre, genre: animation, release_gte: "1937-01-01", votes_gte: 5000}
    summary: Animated film is a collection of illustrations that are photographed frame-by-frame and then played in a quick succession. Since its inception, animation has had a creative and imaginative tendency. Being able to bring animals and objects to life, this genre has catered towards fairy tales and children's stories. However, animation has long been a genre enjoyed by all ages.

  Comedy:
    template: {name: IMDb Genre, genre: comedy}
    summary: Comedy is a genre of film that uses humor as a driving force. The aim of a comedy film is to illicit laughter from the audience through entertaining stories and characters. Although the comedy film may take on some serious material, most have a happy ending.

  Crime:
    template: {name: IMDb Genre, genre: crime}
    summary: Crime film is a genre that revolves around the action of a criminal mastermind. A Crime film will often revolve around the criminal himself, chronicling his rise and fall. Some Crime films will have a storyline that follows the criminal's victim, yet others follow the person in pursuit of the criminal.

  # Documentary: uses item_type: documentary so IMDb filters by doc type (not feature).
  # No year floor – important documentaries span every decade.
  Documentary:
    template: {name: IMDb Genre, genre: documentary, item_type: documentary, release_gte: "1900-01-01", votes_gte: 10000}
    summary: Documentary film is a non-fiction genre intended to document reality primarily for the purposes of instruction, education, or maintaining a historical record.

  Drama:
    template: {name: IMDb Genre, genre: drama}
    summary: Drama film is a genre that relies on the emotional and relational development of realistic characters. While Drama film relies heavily on this kind of development, dramatic themes play a large role in the plot as well. Often, these dramatic themes are taken from intense, real life issues.

  # Family: extends back to 1950 to include golden-age classics (Mary Poppins, Sound of Music, etc.)
  Family:
    template: {name: IMDb Genre, genre: family, release_gte: "1950-01-01", votes_gte: 5000}
    summary: Family film is a genre that contains appropriate content for younger viewers. Family film aims to appeal not only to children, but to a wide range of ages. While the storyline may appeal to a younger audience, there are components of the film that are geared towards adults, such as witty jokes and humor.

  Fantasy:
    template: {name: IMDb Genre, genre: fantasy}
    summary: Fantasy film is a genre that incorporates imaginative and fantastic themes. These themes usually involve magic, supernatural events, or fantasy worlds. Although it is its own distinct genre, these films can overlap into the horror and science fiction genres.

  # History: extends back to 1940 to capture WWII-era epics and classic historical dramas.
  History:
    template: {name: IMDb Genre, genre: history, release_gte: "1940-01-01", votes_gte: 5000, limit: 200}
    summary: History film is a genre that takes historical events and people and interprets them in a larger scale. The drama of a History film is often accentuated by a sweeping musical score, lavish costumes, and high production value.

  Horror:
    template: {name: IMDb Genre, genre: horror}
    summary: Horror film is a genre that aims to create a sense of fear, panic, alarm, and dread for the audience. These films are often unsettling and rely on scaring the audience through a portrayal of their worst fears and nightmares.

  Music:
    template: {name: IMDb Genre, genre: music, limit: 200}
    summary: Music film is a genre that revolves around music being an integral part of the characters' lives.

  # Musical: extends back to 1940 to include golden-age Hollywood musicals (Singin' in the Rain,
  # The Wizard of Oz, Guys and Dolls, etc.)
  Musical:
    template: {name: IMDb Genre, genre: musical, limit: 200, release_gte: "1940-01-01", votes_gte: 5000}
    name_mapping: Musicals
    summary: A Musical interweaves vocal and dance performances into the narrative of the film. Traditional musicals center on a well-known star, famous for their dancing or singing skills (e.g. Fred Astaire, Gene Kelly, Judy Garland).

  Mystery:
    template: {name: IMDb Genre, genre: mystery}
    summary: A Mystery film centers on a person of authority, usually a detective, that is trying to solve a mysterious crime. The main protagonist uses clues, investigation, and logical reasoning.

  Romance:
    template: {name: IMDb Genre, genre: romance, limit: 200}
    summary: Romance film can be defined as a genre wherein the plot revolves around the love between two protagonists. This genre usually has a theme that explores an issue within love, including love at first sight, forbidden love, love triangles, and sacrificial love.

  Romantic Comedy:
    template: {name: IMDb Genre, genre: "romance,comedy", limit: 200}
    name_mapping: Rom-Com
    filters:
      genre: Comedy
    summary: Romantic Comedy is a genre that attempts to catch the viewer's heart with the combination of love and humor. This sub-genre is light-hearted and usually places the two protagonists in humorous situations.

  # Romantic Drama:
  #   template: {name: IMDb Genre, genre: "romance,drama", limit: 200}
  #   filters:
  #     genre: Drama
  #   summary: Romantic Drama film is a genre that explores the complex side of love. The plot usually centers around an obstacle that is preventing love between two people.

  Sci-Fi:
    template: {name: IMDb Genre, genre: sci-fi}
    name_mapping: Science Fiction
    summary: Science Fiction (Sci-Fi) film is a genre that incorporates hypothetical, science-based themes into the plot of the film. Often, this genre incorporates futuristic elements and technologies to explore social, political, and philosophical issues.

  Sports:
    template: {name: IMDb Genre, genre: sport, limit: 200}
    summary: A Sport Film revolves around a sport setting, event, or an athlete. Often, these films will center on a single sporting event that carries significant importance.

  Thriller:
    template: {name: IMDb Genre, genre: thriller}
    summary: Thriller Film is a genre that revolves around anticipation and suspense. The aim for Thrillers is to keep the audience alert and on the edge of their seats. The protagonist in these films is set against a problem – an escape, a mission, or a mystery.

  # War: extends back to 1939 (WWII start) so classics like Casablanca, The Bridge on the
  # River Kwai, and Schindler's List (1993) all appear. Lower vote threshold for older films.
  War:
    template: {name: IMDb Genre, genre: war, limit: 200, release_gte: "1939-01-01", votes_gte: 5000}
    summary: War Film is a genre that looks at the reality of war on a grand scale. They often focus on landmark battles as well as political issues within war. This genre usually focuses on a main character and his team of support, giving the audience an inside look into the gritty reality of war.

  # Western: extends back to 1939 (Stagecoach, 1939) to include John Wayne, Gary Cooper,
  # and Clint Eastwood classics that define the genre.
  Western:
    template: {name: IMDb Genre, genre: western, limit: 200, release_gte: "1939-01-01", votes_gte: 5000}
    summary: Western Film is a genre that revolves around stories primarily set in the late 19th century in the American Old West. Common themes include the conquest of the wild west, outlaws, gunfights, and frontier justice.

  # ── Custom / keyword / list-based collections ─────────────────────────────

  Gangster:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: gangster, mafia, mob, organized-crime, crime-boss, mobster, crime-family, hitman, gangland
      limit: 400
    filters:
      genre: Crime
    summary: Gangster film is a sub-genre of crime films that center on organized crime or the mafia. Often the plot revolves around the rise and fall of an organized crime leader.

  Halloween:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: halloween, trick-or-treat, jack-o-lantern, halloween-party, haunted-house
      limit: 400
    summary: Films that revolve around Halloween themes, tricks, and frights.

  LGBTQ+:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: gay, lesbian, bisexual, transgender, lgbt, lgbtq, homosexuality, coming-out, same-sex-relationship, gay-relationship, lesbian-relationship, queer, gay-marriage
      limit: 400
    summary: Films where the story centers on lesbian, gay, bisexual, transgender, queer, and intersex characters and experiences.

  Martial Arts:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: martial-arts, kung-fu, karate, judo, taekwondo, ninjutsu, wushu, hand-to-hand-combat, martial-artist, kickboxing, mixed-martial-arts, capoeira, shaolin
      limit: 400
    summary: Martial Arts film is a sub-genre of action films featuring martial arts combat as the primary appeal and entertainment value.

  # Pandemic:
  #   template: {name: Other Genre}
  #   imdb_search:
  #     keyword.any: deadly-virus, health-crisis, pandemic, public-health-epidemic, virus, coronavirus
  #     limit: 1000
  #   imdb_list:
  #     - https://www.imdb.com/list/ls041901506/
  #     - https://www.imdb.com/list/ls092321048/
  #   summary: Films revolving around widespread viruses, plagues, and disease outbreaks.

  # Sword & Sorcery:
  #   template: {name: Other Genre}
  #   imdb_search:
  #     keyword.any: sword-and-sorcery, barbarian, sorcerer, dark-fantasy, enchanted-sword, sword-fight, warrior, black-magic, wizard, dungeon
  #     limit: 400
  #   filters:
  #     genre: Fantasy
  #   summary: Sword and Sorcery film is a sub-genre of Fantasy relying on heavy action and battle scenes. Common themes include rescue missions, saving a princess, and battling fantastical monsters.

  # ── Extended / keyword-based genre collections ────────────────────────────

  # --- Genre posters under assets/Genres/ (Kometa collection name = folder name) ---
  Action Heroines:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: heroine, female-warrior, woman-warrior, action-heroine, female-action-hero
      limit: 400
    summary: Action films centered on women in lead heroic or combat roles.

  # Anime: keyword + genre filter ensures only animated titles appear.
  Anime:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: anime, japanese-animation, manga-adaptation
      limit: 400
    filters:
      genre: Animation
    summary: Japanese-style animation and closely related animated features.

  Biopic:
    template: {name: IMDb Genre, genre: biography, limit: 200}
    filters:
      genre.not: Science Fiction
    summary: Films dramatizing the life of a real person.

  Christmas:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: christmas, santa-claus, christmas-eve, christmas-movie, christmas-tree
      limit: 400
    summary: Films centered on Christmas and the holiday season.

  Cooking:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: cooking, chef, culinary, baking, gastronomy, food-preparation, food-critic, food-culture, cookery
      limit: 400
    filters:
      genre.not: Action
    summary: Films where cooking, chefs, or food culture drives the story.

  Disaster:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: disaster, natural-disaster, earthquake, tsunami, airplane-crash, volcanic-eruption, flood, wildfire
      limit: 400
    summary: Survival and spectacle around large-scale catastrophes.

  Dramedy:
    template: {name: IMDb Genre, genre: "comedy,drama", limit: 200}
    summary: Films that blend comedic and dramatic tones in roughly equal measure.

  # Easter:
  #   template: {name: Other Genre}
  #   imdb_search:
  #     keyword.any: easter, easter-bunny, easter-egg, good-friday, holy-week
  #     limit: 400
  #   summary: Films tied to Easter themes and spring religious or family stories.

  # Film Noir: the defining era is 1940s–60s; remove the 1990 floor entirely and lower
  # the vote threshold so classics like Double Indemnity and Out of the Past are included.
  Film Noir:
    template: {name: IMDb Genre, genre: "film-noir", limit: 200, release_gte: "1920-01-01", votes_gte: 3000}
    summary: Dark, cynical crime and mystery pictures — shadowy cinematography, femmes fatales, moral ambiguity. The golden age spans the 1940s to the early 1960s.

  # Foreign: keyword-based on IMDb's own tagging for non-English-language films.
  Foreign:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: foreign-language, non-english-language, world-cinema, foreign-language-film
      limit: 400
    summary: Non-English-language or strongly international productions.

  Holocaust:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: holocaust, nazi-concentration-camp, shoah, world-war-two-jewish, jewish-persecution
      limit: 400
    summary: Films dealing with the Holocaust and related historical persecution.

  Music Biopic:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: music-biopic, rock-band, composer, classical-musician, rock-star, based-on-real-musician, singer-biography, musician-biography
      limit: 400
    filters:
      genre: Biography
    summary: Real-life stories centered on musicians, bands, and composers.

  New Year:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: new-years-eve, new-year, new-years-day
      limit: 400
    summary: Films centered on New Year celebrations and resolutions.

  Post-Apocalypse:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: post-apocalypse, post-apocalyptic, dystopia, end-of-the-world, civilizational-collapse
      limit: 400
    summary: Stories set after civilization-scale collapse or ruin.

  Samurai:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: samurai, bushido, ronin, katana, feudal-japan
      limit: 400
    summary: Japanese period action and drama centered on samurai.

  St. Patrick's Day:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: st-patricks-day, saint-patricks-day, leprechaun, shamrock, irish-mythology, celtic-mythology
      limit: 400
    summary: Irish folklore and St. Patrick's Day themed stories.

  Thanksgiving:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: thanksgiving, thanksgiving-dinner, thanksgiving-holiday
      limit: 400
    summary: Films built around Thanksgiving gatherings and themes.

  Time Travel:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: time-travel, time-machine, time-loop
      limit: 400
    summary: Stories involving travel through time or loops in time.

  # True Stories:
  #   template: {name: Other Genre}
  #   imdb_search:
  #     keyword.any: based-on-true-story, true-story, based-on-real-events
  #     limit: 400
  #   summary: Dramas and thrillers explicitly based on real events.

  Valentine's:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: valentines-day, valentine
      limit: 400
    summary: Romance and comedy tied to Valentine's Day.

  Vempires:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: vampire, vampires, bloodsucker
      limit: 400
    summary: Vampire horror and fantasy (folder name matches asset spelling).

  Video Game:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: video-game, based-on-video-game, video-game-adaptation
      limit: 400
    summary: Adaptations of games or stories dominated by gaming culture.

  Werewolvs:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: werewolf, werewolves, lycanthrope, lycanthropy
      limit: 400
    summary: Werewolf horror and fantasy (folder name matches asset spelling).

  WW1:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: world-war-one, first-world-war, wwi, trench-warfare, great-war
      limit: 400
    summary: World War I settings and stories.

  WW2:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: world-war-two, second-world-war, wwii, nazi-germany, normandy
      limit: 400
    summary: World War II settings and stories.

  Zombies:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: zombie, zombies, zombie-apocalypse, undead
      limit: 400
    summary: Undead outbreak and survival horror.

  # Superhero:
  #   template: {name: Other Genre}
  #   imdb_search:
  #     keyword.any: superhero, super-hero, superhuman, comic-book-adaptation
  #     limit: 400
  #   summary: Costumed heroes, comic-inspired action, and superpowered leads.

  "Heist & Espionage":
    template: {name: Other Genre}
    imdb_search:
      keyword.any: heist, bank-robbery, jewel-theft, espionage, spy, secret-agent, undercover-agent, intelligence-agent
      limit: 400
    summary: Capers, robberies, and spy thrillers in one browse bucket.

  Teen:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: teenager, high-school, teen-comedy, teen-drama, teenage-girl, teenage-boy, coming-of-age
      limit: 400
    summary: High-school years, teen comedy/drama, and adolescent coming-of-age stories.

  Short Films:
    template: {name: Other Genre}
    imdb_search:
      - type: short
        rating.gte: 5.0
        votes.gte: 25
        limit: 350
      - keyword.any: short-film
        limit: 200
    summary: IMDb-classified short films plus titles tagged short-film.

  Pirates:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: pirate, pirates, piracy, swashbuckler, buccaneer, pirate-ship
      limit: 400
    summary: High seas, buried treasure, and swashbuckling adventure.

  Road Trip:
    template: {name: Other Genre}
    imdb_search:
      keyword.any: road-trip, road-movie, cross-country-trip, cross-country-road-trip, hitchhiking, road-trip-comedy
      limit: 400
    summary: Films where the journey itself is the point — road movies, cross-country adventures, and life-changing drives.
