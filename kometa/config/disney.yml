templates:
  Mouse_House_Collection:
    plex_search:
      all:
        title: <<txt>>
      any:
        studio:
          - Disney
          - Pixar
      validate: false
      sort_by: release.asc
    name_mapping: <<coll>> Collection
    collection_order: custom
    sync_mode: sync

collections:
  Disney Animation:
    plex_search:
      all:
        studio: "Walt Disney Animation Studios"
    name_mapping: Walt Disney Animation Studios
  
  # Disney Live-Action Remakes is defined in collections.yml with the full title list
  # and genre.not: Animation filter — do not duplicate here.

  Pixar Animation:
    plex_all: true
    filters:
      studio: "Pixar Animation Studios"
      duration.gt: 40
    name_mapping: Pixar Animation Studios

  # Pixar Shorts is defined in collections.yml (with item_assets: true) — do not duplicate here.

  Disney's Fantasia:
    template:
      name: Mouse_House_Collection
      txt: Fantasia
      coll: Fantasia
  
