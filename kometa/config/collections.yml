# Custom Plex collections that Kometa defaults do not create

collections:
  Disney Live-Action Remakes:
    plex_search:
      all:
        title.is:
          - "101 Dalmatians"
          - "102 Dalmatians"
          - "Aladdin"
          - "Alice in Wonderland"
          - "Alice Through the Looking Glass"
          - "Beauty and the Beast"
          - "Christopher Robin"
          - "Cinderella"
          - "Cruella"
          - "Dumbo"
          - "Lady and the Tramp"
          - "Lilo & Stitch"
          - "Maleficent"
          - "Maleficent: Mistress of Evil"
          - "Mufasa: The Lion King"
          - "Mulan"
          - "Peter Pan & Wendy"
          - "Pete's Dragon"
          - "Pinocchio"
          - "Snow White"
          - "The Jungle Book"
          - "The Lion King"
          - "The Little Mermaid"
        year.gte: 1994
        genre.not: Animation
    sync_mode: sync
    item_assets: true
    collection_order: release
    summary: Disney live-action remakes and companion films.

  # Spider-Man (MCU):
  #   plex_search:
  #     all:
  #       title: "Spider-Man"
  #       actor: "Tom Holland"
  #       genre.not: Animation
  #   sync_mode: sync
  #   item_assets: true
  #   collection_order: release
  #   summary: Tom Holland MCU Spider-Man Movies.

  Spider-Man (Tobey):
    plex_search:
      all:
        title: "Spider-Man"
        actor: "Tobey Maguire"
        genre.not: Animation
    sync_mode: sync
    item_assets: true
    collection_order: release
    summary: Tobey Maguire Spider-Man Movies.

  Spider-Man (Andrew):
    plex_search:
      all:
        title: "Spider-Man"
        actor: "Andrew Garfield"
        genre.not: Animation
    sync_mode: sync
    item_assets: true
    collection_order: release
    summary: Andrew Garfield, aka the best Spider-Man, Spider-Man movies.

  Pixar Shorts:
    plex_all: true
    filters:
      duration.lte: 15
      studio: "Pixar Animation Studios"
    sync_mode: sync
    item_assets: true
    collection_order: release
    summary: Pixar shorts (≤15 min) from Pixar Animation Studios.

  A Star Is Born:
    plex_search:
      any:
        title: "A Star Is Born"
    sync_mode: sync
    item_assets: true
    collection_order: release

  Robin Williams Live:
    plex_search:
      any:
        title:
          - "Robin Williams -"
          - "An Evening with Robin Williams"
    sync_mode: sync
    item_assets: true
    collection_order: release

  The Lion King (Reboot):
    plex_search:
      any:
        title:
          - "The Lion King"
          - "Mufasa"
    filters:
      year.gte: 2019
    sync_mode: sync
    item_assets: true
    collection_order: release
    summary: The 2019 CGI Lion King and its 2024 prequel Mufasa.

  Cars Toons and Short Films:
    plex_search:
      any:
        title:
          - "Cars Toon"
          - "Air Mater"
          - "Mater and the Ghostlight"
          - "Mater Private Eye"
          - "Mater the Greater"
          - "El Materdor"
          - "Heavy Metal Mater"
          - "Monster Truck Mater"
          - "Moon Mater"
          - "Rescue Squad Mater"
          - "Time Travel Mater"
          - "Tokyo Mater"
          - "Unidentified Flying Mater"
          - "The Radiator Springs 500"
          - "Miss Fritter"
          - "Spinning"
          - "Hiccups"
          - "Bugged"
    sync_mode: sync
    item_assets: true
    collection_order: release
    summary: Cars Toons / Mater’s Tall Tales–style shorts.

  Royal Shakespeare Company Live:
    plex_search:
      any:
        studio: "Royal Shakespeare Company"
    sync_mode: sync
    item_assets: true
    collection_order: release
    summary: Live theatre recordings from the Royal Shakespeare Company, filmed at Stratford-upon-Avon.

  # ── Studio collections not covered by default: studio ─────────────────────

  Studio Ponoc:
    plex_all: true
    filters:
      studio: "Studio Ponoc"
    sync_mode: sync
    item_assets: true
    collection_order: release
    summary: Films from Studio Ponoc, founded by former Ghibli producer Yoshiaki Nishimura.
    sort_title: "!070_Studio Ponoc"

